name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --noconfirm
          --onefile
          --windowed
          --name bid_simulator
          bid_simulator.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bid-simulator-windows
          path: dist/bid_simulator.exe
