name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Build Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install `
            pyinstaller `
            playwright `
            pillow `
            numpy `
            opencv-python-headless `
            scikit-learn `
            cryptography `
            requests `
            beautifulsoup4

      - name: Smoke Test Python Imports
        shell: pwsh
        run: |
          python -c "import requests, bs4, cryptography, cv2, numpy, sklearn, playwright; import ggzy_gov_collector; import jianyu_project_collector; import jianyu_desktop; print('python import smoke test passed')"

      - name: Install Playwright Browsers
        shell: pwsh
        run: |
          python -m playwright install chromium msedge

      - name: Build Bid Simulator EXE
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name bid_simulator `
            bid_simulator.py

      - name: Build Jianyu Desktop EXE
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name jianyu_desktop `
            --collect-all playwright `
            --collect-all cryptography `
            --collect-all requests `
            --collect-all bs4 `
            --collect-all urllib3 `
            --collect-all certifi `
            --collect-all charset_normalizer `
            --collect-all idna `
            --collect-all soupsieve `
            --collect-all PIL `
            --collect-all cv2 `
            --hidden-import sklearn `
            --hidden-import sklearn.cluster `
            --hidden-import requests `
            --hidden-import requests.adapters `
            --hidden-import requests.sessions `
            --hidden-import requests.models `
            --hidden-import bs4 `
            --hidden-import bs4.builder `
            --hidden-import urllib3 `
            --hidden-import certifi `
            --hidden-import charset_normalizer `
            --hidden-import idna `
            --hidden-import soupsieve `
            --hidden-import numpy `
            jianyu_desktop.py

      - name: Package Jianyu Desktop Folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist/jianyu_desktop/* -DestinationPath dist/jianyu_desktop_windows.zip -Force

      - name: Upload Bid Simulator Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bid-simulator-windows
          path: dist/bid_simulator.exe

      - name: Upload Jianyu Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jianyu-desktop-windows
          path: dist/jianyu_desktop_windows.zip
