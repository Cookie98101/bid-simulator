name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Build Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install `
            pyinstaller `
            playwright `
            pillow `
            numpy `
            opencv-python-headless `
            scikit-learn `
            cryptography `
            requests `
            beautifulsoup4 `
            openpyxl

      - name: Smoke Test Python Imports
        shell: pwsh
        run: |
          python -c "import requests, bs4, cryptography, cv2, numpy, sklearn, playwright, openpyxl; import ggzy_gov_collector; import jianyu_project_collector; import jianyu_desktop; import project_excel_analyzer; print('python import smoke test passed')"

      - name: Install Playwright Browsers
        shell: pwsh
        run: |
          python -m playwright install chromium msedge

      - name: Build Bid Simulator EXE
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name bid_simulator `
            bid_simulator.py

      - name: Build Jianyu Desktop EXE
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name jianyu_desktop `
            --collect-all playwright `
            --collect-all cryptography `
            --collect-all requests `
            --collect-all bs4 `
            --collect-all urllib3 `
            --collect-all certifi `
            --collect-all charset_normalizer `
            --collect-all idna `
            --collect-all soupsieve `
            --collect-all PIL `
            --collect-all cv2 `
            --hidden-import sklearn `
            --hidden-import sklearn.cluster `
            --hidden-import requests `
            --hidden-import requests.adapters `
            --hidden-import requests.sessions `
            --hidden-import requests.models `
            --hidden-import bs4 `
            --hidden-import bs4.builder `
            --hidden-import urllib3 `
            --hidden-import certifi `
            --hidden-import charset_normalizer `
            --hidden-import idna `
            --hidden-import soupsieve `
            --hidden-import numpy `
            jianyu_desktop.py

      - name: Build Project Excel Analyzer EXE
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name project_excel_analyzer `
            --collect-all openpyxl `
            --hidden-import openpyxl `
            project_excel_analyzer.py

      - name: Smoke Test Built EXEs
        shell: pwsh
        run: |
          $bid = Start-Process -FilePath "dist/bid_simulator.exe" -PassThru
          Start-Sleep -Seconds 8
          if ($bid.HasExited) {
            throw "bid_simulator.exe exited during startup. Check packaging/runtime dependencies."
          }
          Stop-Process -Id $bid.Id -Force

          $jianyu = Start-Process -FilePath "dist/jianyu_desktop/jianyu_desktop.exe" -PassThru
          Start-Sleep -Seconds 8
          if ($jianyu.HasExited) {
            throw "jianyu_desktop.exe exited during startup. Check packaging/runtime dependencies."
          }
          Stop-Process -Id $jianyu.Id -Force

          $analyzer = Start-Process -FilePath "dist/project_excel_analyzer.exe" -PassThru
          Start-Sleep -Seconds 8
          if ($analyzer.HasExited) {
            throw "project_excel_analyzer.exe exited during startup. Check packaging/runtime dependencies."
          }
          Stop-Process -Id $analyzer.Id -Force

      - name: Package Jianyu Desktop Folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist/jianyu_desktop/* -DestinationPath dist/jianyu_desktop_windows.zip -Force

      - name: Upload Bid Simulator Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bid-simulator-windows
          path: dist/bid_simulator.exe

      - name: Upload Jianyu Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jianyu-desktop-windows
          path: dist/jianyu_desktop_windows.zip

      - name: Upload Project Excel Analyzer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-excel-analyzer-windows
          path: dist/project_excel_analyzer.exe
